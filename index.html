<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vanta — Obsidian for GitHub</title>
<meta name="description" content="Browse your Obsidian vault and capture to your inbox — straight from your private GitHub repo. No servers in between.">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font: 17px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0a0a0a; color: #e8e8ea; text-align: center; padding: 2rem;
  }
  .mark {
    width: 88px; height: 88px; border-radius: 20px;
    background: linear-gradient(160deg, #1c1c1e, #000);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 40px rgba(0,0,0,.5); margin-bottom: 1.5rem;
  }
  .mark span {
    font-family: "Snell Roundhand", "Apple Chancery", cursive;
    font-size: 56px; font-weight: 700;
    background: linear-gradient(180deg, #f4f4f6, #9a9aa0);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  h1 { font-size: 2rem; margin: 0 0 .25rem; letter-spacing: -.02em; }
  p.tag { color: #9a9aa0; max-width: 32ch; margin: 0 0 2rem; }
  a.btn {
    color: #e8e8ea; text-decoration: none; border: 1px solid #2c2c2e;
    padding: .6rem 1.2rem; border-radius: 999px; transition: border-color .2s;
  }
  a.btn:hover { border-color: #6a6a70; }
  footer { margin-top: 3rem; color: #6a6a70; font-size: .85rem; }
  footer a { color: #9a9aa0; }
</style>
</head>
<body>
  <div class="mark"><span>V</span></div>
  <h1>Vanta</h1>
  <p class="tag">Your Obsidian vault on iPhone, backed by your own private GitHub repo. No servers in between.</p>
  <a class="btn" href="./privacy/">Privacy Policy</a>
  <footer>© 2026 Shane Vitarana · <a href="mailto:support@shanev.ai">support@shanev.ai</a></footer>
</body>
</html>
